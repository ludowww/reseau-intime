name: One-shot J09 co-presence cleanup

on:
  push:
    branches:
      - agent/lot-c-source-consolidation

permissions:
  contents: write

jobs:
  sanitize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/lot-c-source-consolidation
          fetch-depth: 0

      - name: Apply J09 co-presence cleanup
        run: python3 tools/_lot_c_sanitize_j09.py

      - name: Validate documentation-only diff
        run: |
          git diff --check
          if git diff --name-only | grep -Ev '^(docs/|tools/_lot_c_sanitize_j09.py$|\.github/workflows/lot-c-sanitize-j09.yml$)' ; then
            echo 'Unexpected non-documentary file changed.' >&2
            exit 1
          fi

      - name: Remove temporary sanitizer
        run: |
          rm tools/_lot_c_sanitize_j09.py
          rm .github/workflows/lot-c-sanitize-j09.yml

      - name: Commit cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: remove remaining J09 co-presence chat'
          git push origin HEAD:agent/lot-c-source-consolidation
