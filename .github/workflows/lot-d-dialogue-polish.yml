name: One-shot Lot D dialogue polish

on:
  push:
    branches:
      - agent/lot-d-voice-naturalness-polish

permissions:
  contents: write

jobs:
  polish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/lot-d-voice-naturalness-polish
          fetch-depth: 0

      - name: Apply dialogue polish
        run: python3 tools/_lot_d_polish_dialogues.py

      - name: Validate documentary scope
        run: |
          git diff --check
          if git diff --name-only | grep -Ev '^(docs/|tools/_lot_d_polish_dialogues.py$|\.github/workflows/lot-d-dialogue-polish.yml$)' ; then
            echo 'Unexpected non-documentary file changed.' >&2
            exit 1
          fi

      - name: Remove temporary files
        run: |
          rm tools/_lot_d_polish_dialogues.py
          rm .github/workflows/lot-d-dialogue-polish.yml

      - name: Commit polish
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: polish season 1 dialogue voices'
          git push origin HEAD:agent/lot-d-voice-naturalness-polish
