name: One-shot final Lot D text-only fixes

on:
  push:
    branches:
      - agent/lot-d-voice-naturalness-polish

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/lot-d-voice-naturalness-polish
          fetch-depth: 0

      - name: Apply final text-only fixes
        run: python3 tools/_lot_d_final_text_only_fix.py

      - name: Validate documentary scope
        run: |
          git diff --check
          if git diff --name-only | grep -Ev '^(docs/|tools/_lot_d_final_text_only_fix.py$|\.github/workflows/lot-d-final-text-only.yml$)' ; then
            echo 'Unexpected non-documentary file changed.' >&2
            exit 1
          fi

      - name: Remove temporary files
        run: |
          rm tools/_lot_d_final_text_only_fix.py
          rm .github/workflows/lot-d-final-text-only.yml

      - name: Commit final fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: finalize lot D text-only polish'
          git push origin HEAD:agent/lot-d-voice-naturalness-polish
